# Test manifest scope configuration.
#
# This file is parsed as data (never executed) via safe-conf.sh by:
# - .beryl/scripts/check-tests-unchanged.sh
# - .beryl/scripts/update-test-manifest.sh
#
# Only simple NAME="value" and NAME=( "item" ... ) assignments are
# supported; shell expansions and command substitutions are rejected.
# Paths are repository-relative.

# Where the manifest is stored.
MANIFEST_PATH="tests/.manifest.sha256"

# Files matching ANY include pattern are tracked by the manifest.
INCLUDE_GLOBS=(
  "tests/**"
  "spec/**"
  "src/**/__tests__/**"
  "**/*.test.*"
  "**/*.spec.*"
  "**/*_test.go"
  "**/*_test.py"
)

# Files matching ANY exclude pattern are ignored, even if included above.
EXCLUDE_GLOBS=(
  ".git/**"
  ".github/**"
  "node_modules/**"
  "vendor/**"
  ".venv/**"
  "dist/**"
  "build/**"
  "coverage/**"
  ".next/**"
  "**/__pycache__/**"
  "**/*.pyc"
)

