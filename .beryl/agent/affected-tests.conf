# Affected test gate configuration.
#
# This file is parsed as data (never executed) by
# .beryl/scripts/check-affected.sh via safe-conf.sh. Only simple
# NAME="value" and NAME=( "item" ... ) assignments are supported;
# shell expansions and command substitutions are rejected.
# Paths and globs are repository-relative.

# Run this command when a change is too broad to select safely.
FULL_TEST_CMD=("python3" "-m" "unittest" "discover" "-s" "tests" "-v")

# Run this command for source/test files that can be mapped to related tests.
# Changed files are appended as positional arguments; unittest discover ignores
# extra paths poorly, so use the full deterministic suite for now.
RELATED_TEST_CMD=()

# Files matching these patterns force FULL_TEST_CMD, when configured.
GLOBAL_CHANGE_GLOBS=(
  ".beryl/agent/affected-tests.conf"
  ".beryl/agent/testing-policy.md"
  ".beryl/scripts/check-affected.sh"
  ".beryl/scripts/check-project.sh"
  ".beryl/githooks/pre-commit"
  "pyproject.toml"
  "uv.lock"
  "pytest.ini"
  "tox.ini"
)

# Files matching these patterns are considered eligible for related-test runs.
RELATED_CHANGE_GLOBS=(
  "proofbench/**"
  "tests/**"
  "scripts/**"
  "**/*_test.py"
)

# Files matching these patterns do not select project tests by themselves.
IGNORED_CHANGE_GLOBS=(
  "*.md"
  "docs/**"
  ".beryl/agent/adr/**"
)
